<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titulo}">Formulario Material</title>
    <link rel="stylesheet" th:href="@{/CSS/styles.css}">
</head>
<body class="mod-materiales">
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="wrap">

    <a class="volver" href="/materiales/listar">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 12H5M12 5l-7 7 7 7"/>
        </svg>
        Volver a Materiales
    </a>

    <h1 th:text="${titulo}">Formulario de Material</h1>

    <div class="form-card">
        <form th:action="@{/materiales/form}" th:object="${material}" method="post">

            <input type="hidden" th:field="*{id}">

            <div class="field">
                <label for="nombre">Nombre del Material</label>
                <input type="text" id="nombre" th:field="*{nombre}" placeholder="Ej: Cemento gris"maxlength="50">
                <p style="color:#ff4d6d;font-size:.75rem;margin-top:5px;"
       th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></p>
            </div>

            <div class="field">
                <label for="descripcion">Descripción</label>
                <textarea id="descripcion" th:field="*{descripcion}" placeholder="Ej: Bulto de cemento 50kg para construcción" maxlength="200"></textarea>
                <p style="color:#ff4d6d;font-size:.75rem;margin-top:5px;"
       th:if="${#fields.hasErrors('descripcion')}" th:errors="*{descripcion}"></p>
            </div>

            <div class="field">
                <label for="valorUnitario">Valor Unitario</label>
                <input type="number" id="valorUnitario" th:field="*{valorUnitario}" placeholder="Ej: 25000" step="1" min="1" max="9999999999">
                <p style="color:#ff4d6d;font-size:.75rem;margin-top:5px;"
       th:if="${#fields.hasErrors('valorUnitario')}" th:errors="*{valorUnitario}"></p>
                <p class="field-hint">Ingresa el valor en pesos sin puntos ni comas</p>
            </div>

            <div class="divider"></div>

            <div class="actions">
                <button type="submit">Guardar Material</button>
                <a class="btn-cancel" href="/materiales/listar">Cancelar</a>
            </div>

        </form>
    </div>

</div>
</body>
</html>
