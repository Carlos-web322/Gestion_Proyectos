<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titulo}">Formulario</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="mod-proyecto">
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="wrap">

    <a class="volver" href="/listar">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 12H5M12 5l-7 7 7 7"/>
        </svg>
        Volver al listado
    </a>

    <h1 th:text="${titulo}">Formulario de Proyecto</h1>

    <div class="form-card">
        <form th:action="@{/form}" th:object="${proyecto}" method="post">

            <input type="hidden" th:field="*{id}">

            <div class="field">
                <label for="nombre">Nombre del Proyecto</label>
                <input type="text" id="nombre" th:field="*{nombre}"
                       placeholder="Ej: Desarrollo de plataforma web" maxlength="50">
                <p style="color:#ff4d6d;font-size:.75rem;margin-top:5px;"
                   th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></p>
            </div>

            <div class="field">
                <label for="idCliente">ID del Cliente</label>
                <input type="number" id="idCliente" th:field="*{idCliente}"
                       placeholder="Ej: 1" min="1">
                <p style="color:#ff4d6d;font-size:.75rem;margin-top:5px;"
                   th:if="${#fields.hasErrors('idCliente')}" th:errors="*{idCliente}"></p>
            </div>

            <div class="field">
                <label for="fecha">Fecha</label>
                <input type="date" id="fecha" th:field="*{fecha}">
                <p style="color:#ff4d6d;font-size:.75rem;margin-top:5px;"
                   th:if="${#fields.hasErrors('fecha')}" th:errors="*{fecha}"></p>
            </div>

            <div class="divider"></div>

            <div class="actions">
                <button type="submit">Guardar Proyecto</button>
                <a class="btn-cancel" href="/listar">Cancelar</a>
            </div>

        </form>
    </div>
</div>
</body>
</html>
