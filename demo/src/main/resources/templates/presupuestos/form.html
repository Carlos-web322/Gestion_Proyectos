<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titulo}">Formulario Presupuesto</title>
    <link rel="stylesheet" th:href="@{/CSS/styles.css}">
</head>
<body class="mod-presupuesto">
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="wrap">

    <a class="volver" href="/presupuestos/listar">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 12H5M12 5l-7 7 7 7"/>
        </svg>
        Volver a Presupuestos
    </a>

    <h1 th:text="${titulo}">Formulario de Presupuesto</h1>

    <!-- Mensaje de error -->
    <div th:if="${error}" style="background:rgba(255,77,109,.1);border:1px solid rgba(255,77,109,.3);
         color:#ff4d6d;padding:12px 16px;border-radius:8px;margin-bottom:20px;font-size:.88rem;">
        <span th:text="${error}"></span>
    </div>

    <div class="form-card">
        <form th:action="@{/presupuestos/form}" th:object="${presupuesto}" method="post">

            <input type="hidden" th:field="*{id}">

            <div class="field">
                <label for="proyecto">Proyecto</label>
                <select id="proyecto" name="proyecto.id">
                    <option value="">-- Seleccione un proyecto --</option>
                    <option th:each="p : ${proyectos}"
                            th:value="${p.id}"
                            th:selected="${presupuesto.proyecto != null and presupuesto.proyecto.id == p.id}"
                            th:text="${p.nombre}">
                    </option>
                </select>
                <p class="field-hint">Selecciona el proyecto al que pertenece este presupuesto</p>
            </div>

            <div class="divider"></div>

            <div class="actions">
                <button type="submit">Guardar Presupuesto</button>
                <a class="btn-cancel" href="/presupuestos/listar">Cancelar</a>
            </div>

        </form>
    </div>

</div>
</body>
</html>
