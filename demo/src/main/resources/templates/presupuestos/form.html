<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titulo}">Formulario Presupuesto</title>
    <link rel="stylesheet" th:href="@{/CSS/styles.css}">
</head>
<body class="mod-presupuesto">
<div class="wrap">

    <a class="volver" href="/presupuestos/listar">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 12H5M12 5l-7 7 7 7"/>
        </svg>
        Volver a Presupuestos
    </a>

    <h1 th:text="${titulo}">Formulario de Presupuesto</h1>

    <div class="form-card">
        <form th:action="@{/presupuestos/form}" th:object="${presupuesto}" method="post">

            <input type="hidden" th:field="*{id}">

            <div class="field">
                <label for="idProyecto">ID del Proyecto</label>
                <input type="number" id="idProyecto" th:field="*{idProyecto}" placeholder="Ej: 1" min="1">
                <p class="field-hint">Ingresa el ID del proyecto al que pertenece este presupuesto</p>
            </div>

            <div class="field">
                <label for="total">Total</label>
                <input type="number" id="total" th:field="*{total}" placeholder="Ej: 4500" step="0.01" min="0">
                <p class="field-hint">Ingresa el valor total en pesos sin puntos ni comas</p>
            </div>

            <div class="divider"></div>

            <div class="actions">
                <button type="submit">Guardar Presupuesto</button>
                <a class="btn-cancel" href="/presupuestos/listar">Cancelar</a>
            </div>

        </form>
    </div>

</div>
</body>
</html>
