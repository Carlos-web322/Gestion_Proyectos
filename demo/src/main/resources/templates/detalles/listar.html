<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle Presupuesto</title>
    <link rel="stylesheet" th:href="@{/CSS/styles.css}">
</head>
<body class="mod-detalle">
<div class="wrap">

    <header>
        <div class="logo">Detalle Presupuesto</div>
        <div>
            <a class="volver" href="/listar">← Proyectos</a>
            <a class="volver" href="/presupuestos/listar" style="margin-left: 16px;">← Presupuestos</a>
            <a class="crear" href="/detalles/form" style="margin-left: 16px;">+ Nuevo Detalle</a>
            <a class="crear" href="/materiales/listar" style="margin-left: 16px;">+ Ver Material</a>
        </div>
    </header>

    <div class="stats">
        <div class="stat">
            <div class="stat-label">Total</div>
            <div class="stat-val" th:text="${#lists.size(detalle)}">0</div>
        </div>
        <div class="stat">
            <div class="stat-label">Estado</div>
            <div class="stat-val sm stat-accent">Activo</div>
        </div>
        <div class="stat">
            <div class="stat-label">Módulo</div>
            <div class="stat-val sm">Detalles</div>
        </div>
    </div>

    <div class="search-bar">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#7a7a9a" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="text" id="searchInput" placeholder="Buscar por Material..." oninput="filterRows()">
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Proyecto</th>
                    <th>Material</th>
                    <th>Stock</th>
                    <th>Subtotal</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tbody">

                <tr th:if="${#lists.isEmpty(detalle)}">
                    <td colspan="6" class="empty">No hay detalles registrados aún.</td>
                </tr>

                <tr th:each="d : ${detalle}" th:attr="data-name=${#strings.toLowerCase(d.material.nombre)}">
                    <td><span class="td-id" th:text="'#' + ${d.id}"></span></td>
                    <td><span class="td-bold" th:text="${d.presupuesto.proyecto.nombre}">--</span></td>
                    <td th:text="${d.material.nombre}">--</td>
                    <td th:text="${d.stock}">--</td>
                    <td><span class="td-accent" th:text="'$ ' + ${#numbers.formatDecimal(d.subtotal, 1, 'COMMA', 0, 'POINT')}">--</span></td>
                    <td>
                        <a class="editar" th:href="@{/detalles/form/{id}(id=${d.id})}">Editar</a>
                        <a class="eliminar"
                           th:href="@{/detalles/eliminar/{id}(id=${d.id})}"
                           onclick="return confirm('¿Seguro que deseas eliminar este detalle?');">Eliminar</a>
                    </td>
                </tr>

            </tbody>
        </table>
    </div>

</div>
<script>
    function filterRows() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        document.querySelectorAll('#tbody tr[data-name]').forEach(r => {
            r.style.display = String(r.dataset.name).includes(q) ? '' : 'none';
        });
    }
</script>
</body>
</html>
