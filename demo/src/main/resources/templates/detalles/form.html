<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titulo}">Formulario Detalle</title>
    <link rel="stylesheet" th:href="@{/CSS/styles.css}">
</head>
<body class="mod-detalle">
<div class="wrap">

    <a class="volver" href="/detalles/listar">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 12H5M12 5l-7 7 7 7"/>
        </svg>
        Volver a Detalles
    </a>

    <h1 th:text="${titulo}">Formulario de Detalle</h1>

    <div class="form-card">
        <form th:action="@{/detalles/form}" th:object="${detalle}" method="post">

            <input type="hidden" th:field="*{id}">

            <div class="field">
                <label for="idPresupuesto">ID Presupuesto</label>
                <input type="number" id="idPresupuesto" th:field="*{idPresupuesto}" placeholder="Ej: 1" min="1">
                <p class="field-hint">ID del presupuesto al que pertenece este detalle</p>
            </div>

            <div class="field">
                <label for="idMaterial">ID Material</label>
                <input type="number" id="idMaterial" th:field="*{idMaterial}" placeholder="Ej: 1" min="1">
                <p class="field-hint">ID del material utilizado en este detalle</p>
            </div>

            <div class="field">
                <label for="stock">Stock</label>
                <input type="number" id="stock" th:field="*{stock}" placeholder="Ej: 20" min="0">
            </div>

            <div class="field">
                <label for="subtotal">Subtotal</label>
                <input type="number" id="subtotal" th:field="*{subtotal}" placeholder="Ej: 2000" step="0.01" min="0">
                <p class="field-hint">Valor en pesos sin puntos ni comas</p>
            </div>

            <div class="divider"></div>

            <div class="actions">
                <button type="submit">Guardar Detalle</button>
                <a class="btn-cancel" href="/detalles/listar">Cancelar</a>
            </div>

        </form>
    </div>

</div>
</body>
</html>
