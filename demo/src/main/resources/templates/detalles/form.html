<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titulo}">Formulario Detalle</title>
    <link rel="stylesheet" th:href="@{/CSS/styles.css}">
    <style>
        .subtotal-preview {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 16px;
            font-family: 'Syne', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--accent);
        }
        .subtotal-label {
            font-size: .72rem;
            font-weight: 500;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 8px;
            display: block;
        }
    </style>
</head>
<body class="mod-detalle">
<div class="wrap">

    <a class="volver" href="/detalles/listar">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 12H5M12 5l-7 7 7 7"/>
        </svg>
        Volver a Detalles
    </a>

    <h1 th:text="${titulo}">Formulario de Detalle</h1>

    <div class="form-card">
        <form th:action="@{/detalles/form}" th:object="${detalle}" method="post">

            <input type="hidden" th:field="*{id}">

            <div class="field">
                <label for="presupuesto">Seleccione Proyecto / Presupuesto</label>
                <select id="presupuesto" name="presupuesto.id">
                    <option value="">-- Seleccione un proyecto --</option>
                    <option th:each="p : ${presupuestos}"
                            th:value="${p.id}"
                            th:selected="${detalle.presupuesto != null and detalle.presupuesto.id == p.id}"
                            th:text="${p.proyecto.nombre} + ' — Presupuesto #' + ${p.id}">
                    </option>
                </select>
            </div>

            <div class="field">
                <label for="material">Material</label>
                <select id="material" name="material.id" onchange="calcularSubtotal()">
                    <option value="" data-valor="0">-- Seleccione un material --</option>
                    <option th:each="m : ${materiales}"
                            th:value="${m.id}"
                            th:attr="data-valor=${m.valorUnitario}"
                            th:selected="${detalle.material != null and detalle.material.id == m.id}"
                            th:text="${m.nombre} + ' — $ ' + ${#numbers.formatDecimal(m.valorUnitario, 1, 'COMMA', 0, 'POINT')}">
                    </option>
                </select>
            </div>

            <div class="field">
                <label for="stock">Cantidad</label>
                <input type="number" id="stock" th:field="*{stock}"
                       placeholder="Ej: 20" min="0" oninput="calcularSubtotal()">
            </div>

            <div class="field">
                <span class="subtotal-label">Subtotal calculado</span>
                <div class="subtotal-preview" id="subtotalPreview">$ 0.00</div>
                <input type="hidden" id="subtotal" th:field="*{subtotal}">
            </div>

            <div class="divider"></div>

            <div class="actions">
                <button type="submit">Guardar Detalle</button>
                <a class="btn-cancel" href="/detalles/listar">Cancelar</a>
            </div>

        </form>
    </div>

</div>
<script>
    function calcularSubtotal() {
        const materialSelect = document.getElementById('material');
        const stockInput = document.getElementById('stock');
        const subtotalHidden = document.getElementById('subtotal');
        const subtotalPreview = document.getElementById('subtotalPreview');

        const valorUnitario = parseFloat(
            materialSelect.options[materialSelect.selectedIndex]?.getAttribute('data-valor') || 0
        );
        const cantidad = parseInt(stockInput.value) || 0;
        const subtotal = valorUnitario * cantidad;

        subtotalHidden.value = subtotal.toFixed(2);
        subtotalPreview.textContent = '$ ' + subtotal.toLocaleString('es-CO', {
            minimumFractionDigits: 0,
            maximumFractionDigits: 0
        });
    }

    // Calcular al cargar si hay valores (modo editar)
    window.onload = function() {
        calcularSubtotal();
    };
</script>
</body>
</html>
