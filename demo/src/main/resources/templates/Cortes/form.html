<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titulo}">Formulario Corte</title>
    <link rel="stylesheet" th:href="@{/CSS/styles.css}">
</head>
<body class="mod-corte">
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="wrap">

    <a class="volver" href="/cortes/listar">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 12H5M12 5l-7 7 7 7"/>
        </svg>
        Volver a Cortes
    </a>

    <h1 th:text="${titulo}">Formulario de Corte</h1>

    <div class="form-card">
        <form th:action="@{/cortes/form}" th:object="${corte}" method="post">

            <input type="hidden" th:field="*{id}">

            <div class="field">
                <label for="descripcion">Descripción</label>
                <textarea id="descripcion" th:field="*{descripcion}"
                          placeholder="Ej: Corte de obra semana 1" maxlength="200"></textarea>
                <p style="color:#ff4d6d;font-size:.75rem;margin-top:5px;"
                   th:if="${#fields.hasErrors('descripcion')}" th:errors="*{descripcion}"></p>
            </div>

            <div class="field">
                <label for="presupuesto">Presupuesto / Proyecto</label>
                 <select id="presupuesto" name="presupuesto.id">
                 <option value="">-- Seleccione un presupuesto --</option>
                <option th:each="p : ${presupuestos}"
                    th:value="${p.id}"
                    th:selected="${corte.presupuesto != null and corte.presupuesto.id == p.id}"
                    th:text="${p.proyecto.nombre} + ' — $ ' + ${#numbers.formatDecimal(p.total, 1, 'COMMA', 0, 'POINT')}">
            </option>
            </select>
            <p class="field-hint">Selecciona el presupuesto al que pertenece este corte</p>
            </div>

            <div class="field">
                <label for="fecha">Fecha</label>
                <input type="date" id="fecha" th:field="*{fecha}">
                <p style="color:#ff4d6d;font-size:.75rem;margin-top:5px;"
                   th:if="${#fields.hasErrors('fecha')}" th:errors="*{fecha}"></p>
            </div>

            <div class="divider"></div>

            <div class="actions">
                <button type="submit">Guardar Corte</button>
                <a class="btn-cancel" href="/cortes/listar">Cancelar</a>
            </div>

        </form>
    </div>

</div>
</body>
</html>
