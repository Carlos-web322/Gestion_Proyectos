spring.application.name=demo
server.port=8082

# Base de datos — usa variables de entorno en producción
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5433/proyectosdb}
spring.datasource.username=${DATABASE_USERNAME:cadiabet}
spring.datasource.password=${DATABASE_PASSWORD:admin123}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect